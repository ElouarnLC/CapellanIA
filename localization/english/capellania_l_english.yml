 # Travel Options Localization
 capellania_travel_light:0 "Light Chapel Suite"
 capellania_travel_light_desc:0 "One chaplain and the personal artefacts. Cheap and fast, but the piety of the journey is minimal."
 capellania_travel_ordinary:0 "Ordinary Chapel Suite"
 capellania_travel_ordinary_desc:0 "A partial suite with portable altar and relics. Regular service on the road, at the cost of some speed and the stability of the seat."
 capellania_travel_solemn:0 "Solemn Chapel Suite"
 capellania_travel_solemn_desc:0 "The full personnel and the major relics. Dazzling ceremonial and diplomatic weight, but slow, costly, and the seat suffers."
